name: Build TrollStore IPA

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: "Xcode configuration"
        required: false
        default: "Release"
        type: choice
        options:
          - Release
          - Debug
      adhoc_sign:
        description: "Ad-hoc sign the app and extensions before packaging"
        required: false
        default: true
        type: boolean

concurrency:
  group: build-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode 26
        run: |
          XCODE_APP="$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"
          sudo xcode-select -s "$XCODE_APP"
          xcodebuild -version

      - name: Run SwiftPM tests
        run: swift test

      - name: Build unsigned device app
        env:
          CONFIGURATION: ${{ inputs.configuration }}
        run: |
          set -euo pipefail
          xcodebuild build \
            -project UniClipboard.xcodeproj \
            -scheme UniClipboard \
            -configuration "$CONFIGURATION" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package IPA
        env:
          CONFIGURATION: ${{ inputs.configuration }}
          ADHOC_SIGN: ${{ inputs.adhoc_sign }}
        run: |
          set -euo pipefail
          APP="$RUNNER_TEMP/DerivedData/Build/Products/$CONFIGURATION-iphoneos/UniClipboard.app"
          if [ ! -d "$APP" ]; then
            echo "error: app bundle not found at $APP" >&2
            find "$RUNNER_TEMP/DerivedData/Build/Products" -maxdepth 3 -type d -name '*.app' -print >&2
            exit 1
          fi

          echo "MinimumOSVersion:"
          /usr/libexec/PlistBuddy -c "Print :MinimumOSVersion" "$APP/Info.plist"

          if [ "$ADHOC_SIGN" = "true" ]; then
            if [ -d "$APP/PlugIns/UniClipboardShare.appex" ]; then
              codesign --force --sign - --timestamp=none \
                --entitlements UniClipboardShare/UniClipboardShare.entitlements \
                "$APP/PlugIns/UniClipboardShare.appex"
            fi
            if [ -d "$APP/PlugIns/UniClipboardKeyboard.appex" ]; then
              codesign --force --sign - --timestamp=none \
                --entitlements UniClipboardKeyboard/UniClipboardKeyboard.entitlements \
                "$APP/PlugIns/UniClipboardKeyboard.appex"
            fi
            codesign --force --sign - --timestamp=none \
              --entitlements UniClipboard/UniClipboard.entitlements \
              "$APP"
            codesign --verify --deep --strict --verbose=2 "$APP"
          fi

          IPA_DIR="$RUNNER_TEMP/ipa"
          mkdir -p "$IPA_DIR/Payload"
          cp -R "$APP" "$IPA_DIR/Payload/"
          ( cd "$IPA_DIR" && ditto -c -k --keepParent Payload "$GITHUB_WORKSPACE/UniClipboard-iOS16.4-${CONFIGURATION}.ipa" )

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: UniClipboard-iOS16.4-${{ inputs.configuration }}-ipa
          path: UniClipboard-iOS16.4-${{ inputs.configuration }}.ipa
          if-no-files-found: error
