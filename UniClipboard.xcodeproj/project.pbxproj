/* Begin PBXShellScriptBuildPhase section */
		4D8A0E012FB1ABCD00C8F901 /* Patch Info.plist (UIFileSharingEnabled + ATS LAN + LocalNetworkUsage + CameraUsage + LocationUsage) */ = {
			isa = PBXShellScriptBuildPhase;
			alwaysOutOfDate = 1;
			buildActionMask = 2147483647;
			files = (
			);
			inputFileListPaths = (
			);
			inputPaths = (
				"$(TARGET_BUILD_DIR)/$(INFOPLIST_PATH)",
			);
			name = "Patch Info.plist (UIFileSharingEnabled + ATS LAN + LocalNetworkUsage + CameraUsage + LocationUsage)";
			outputFileListPaths = (
			);
			outputPaths = (
			);
			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "# After ProcessInfoPlistFile (declared as inputPaths), patch five keys:\n# 1. UIFileSharingEnabled — Xcode 26's processInfoPlistFile silently drops\n#    INFOPLIST_KEY_UIFileSharingEnabled (sibling LS* keys are honored, the\n#    bug is per-key). Files-app needs this to surface the Documents folder.\n# 2. NSAppTransportSecurity > NSAllowsArbitraryLoads — nested dict, no\n#    INFOPLIST_KEY_* equivalent. Lifts ATS entirely because the user's\n#    self-hosted server can sit on arbitrary addresses we can't enumerate\n#    ahead of time: LAN (RFC1918), Tailscale (CGNAT 100.64/10), custom\n#    domains, raw IPs. DO NOT also set NSAllowsLocalNetworking=YES — when\n#    both keys are present, ATS treats LocalNetworking as the narrower,\n#    more-specific permission and re-imposes ATS on anything outside\n#    RFC1918+`.local` (notably the Tailscale CGNAT range), defeating the\n#    intended global opt-out. App Store reviewer will ask for a\n#    justification string: \"app connects to user-deployed SyncClipboard\n#    servers on arbitrary user-controlled hosts; endpoints are not\n#    knowable ahead of time.\"\n# 3. NSLocalNetworkUsageDescription — iOS 14+ requires this string before\n#    the system surfaces the LAN permission prompt; without it, requests\n#    silently fail. zh-Hans copy (matches source language).\n# 4. NSCameraUsageDescription — required to scan QR codes via VisionKit's\n#    DataScannerViewController in the Settings → Servers → Add flow.\n# 5. NSLocationWhenInUseUsageDescription — iOS 13+ gates CNCopyCurrentNetworkInfo\n#    behind Location When In Use auth. Without this string the prompt never\n#    appears and the SSID read silently returns nil.\n# Sandbox is OFF for this target so PlistBuddy in-place writes persist.\n# Idempotent: Add then Set fallback. Verify all five after, fail loudly if\n# the COW overlay regression returns or a key disappears.\nset -e\nPLIST=\"${TARGET_BUILD_DIR}/${INFOPLIST_PATH}\"\nPB=/usr/libexec/PlistBuddy\nif [ ! -f \"$PLIST\" ]; then echo \"error: Info.plist not found at $PLIST\" >&2; exit 1; fi\n$PB -c \"Add :UIFileSharingEnabled bool true\" \"$PLIST\" 2>/dev/null || $PB -c \"Set :UIFileSharingEnabled true\" \"$PLIST\"\n# Force-rebuild the NSAppTransportSecurity dict from scratch so we never inherit\n# a stale NSAllowsLocalNetworking key from an earlier build of this script.\n$PB -c \"Delete :NSAppTransportSecurity\" \"$PLIST\" 2>/dev/null || true\n$PB -c \"Add :NSAppTransportSecurity dict\" \"$PLIST\"\n$PB -c \"Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true\" \"$PLIST\"\nDESC=\"需要访问本地网络以连接你部署的剪贴板服务器\"\n$PB -c \"Add :NSLocalNetworkUsageDescription string $DESC\" \"$PLIST\" 2>/dev/null || $PB -c \"Set :NSLocalNetworkUsageDescription $DESC\" \"$PLIST\"\nCAM=\"需要访问相机以扫描服务器配置二维码\"\n$PB -c \"Add :NSCameraUsageDescription string $CAM\" \"$PLIST\" 2>/dev/null || $PB -c \"Set :NSCameraUsageDescription $CAM\" \"$PLIST\"\nLOC=\"需要位置权限以读取当前 WiFi 名称,用于自动切换服务器\"\n$PB -c \"Add :NSLocationWhenInUseUsageDescription string $LOC\" \"$PLIST\" 2>/dev/null || $PB -c \"Set :NSLocationWhenInUseUsageDescription $LOC\" \"$PLIST\"\nA=$($PB -c \"Print :UIFileSharingEnabled\" \"$PLIST\" 2>/dev/null || true)\nBA=$($PB -c \"Print :NSAppTransportSecurity:NSAllowsArbitraryLoads\" \"$PLIST\" 2>/dev/null || true)\nBLEAK=$($PB -c \"Print :NSAppTransportSecurity:NSAllowsLocalNetworking\" \"$PLIST\" 2>/dev/null || true)\nC=$($PB -c \"Print :NSLocalNetworkUsageDescription\" \"$PLIST\" 2>/dev/null || true)\nD=$($PB -c \"Print :NSCameraUsageDescription\" \"$PLIST\" 2>/dev/null || true)\nE=$($PB -c \"Print :NSLocationWhenInUseUsageDescription\" \"$PLIST\" 2>/dev/null || true)\nif [ \"$A\" != \"true\" ]; then echo \"error: UIFileSharingEnabled persistence failed (got: '$A')\" >&2; exit 1; fi\nif [ \"$BA\" != \"true\" ]; then echo \"error: NSAllowsArbitraryLoads persistence failed (got: '$BA')\" >&2; exit 1; fi\nif [ -n \"$BLEAK\" ]; then echo \"error: NSAllowsLocalNetworking leaked into Info.plist ('$BLEAK') — it narrows ATS and breaks Tailscale CGNAT (100.64/10) when paired with NSAllowsArbitraryLoads\" >&2; exit 1; fi\nif [ -z \"$C\" ]; then echo \"error: NSLocalNetworkUsageDescription persistence failed\" >&2; exit 1; fi\nif [ -z \"$D\" ]; then echo \"error: NSCameraUsageDescription persistence failed\" >&2; exit 1; fi\nif [ -z \"$E\" ]; then echo \"error: NSLocationWhenInUseUsageDescription persistence failed\" >&2; exit 1; fi\n# 6. CFBundleURLTypes — register the uniclipboard:// custom URL scheme so the system Camera (and any app handing off a uniclipboard URL) routes scanned QR codes back via .onOpenURL. Nested array-of-dict, no INFOPLIST_KEY_* equivalent; delete-then-add keeps rebuilds idempotent because PlistBuddy's Add errors on existing keys and Set cannot initialise a missing array.\n$PB -c \"Delete :CFBundleURLTypes\" \"$PLIST\" 2>/dev/null || true\n$PB -c \"Add :CFBundleURLTypes array\" \"$PLIST\"\n$PB -c \"Add :CFBundleURLTypes:0 dict\" \"$PLIST\"\n$PB -c \"Add :CFBundleURLTypes:0:CFBundleURLName string app.uniclipboard.UniClipboard.connect\" \"$PLIST\"\n$PB -c \"Add :CFBundleURLTypes:0:CFBundleURLSchemes array\" \"$PLIST\"\n$PB -c \"Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string uniclipboard\" \"$PLIST\"\nF=$($PB -c \"Print :CFBundleURLTypes:0:CFBundleURLSchemes:0\" \"$PLIST\" 2>/dev/null || true)\nif [ \"$F\" != \"uniclipboard\" ]; then echo \"error: CFBundleURLTypes persistence failed (got: '$F')\" >&2; exit 1; fi\n# 7. UIApplicationShortcutItems — Home Screen quick actions (long-press app icon). Static via Info.plist so the tiles ship with the bundle and appear at install time without needing the app to launch once first; dynamic UIApplication.shared.shortcutItems didn't show up reliably on real devices (Springboard caches the static set from LaunchServices at install). Delete-then-add keeps rebuilds idempotent (PlistBuddy Add errors on existing arrays; Set can't create one). SF Symbol icons via UIApplicationShortcutItemIconSymbolName — square.and.arrow.up/down match the iOS share/save vocabulary the user already recognises.\nSC1T=\"发送\"\nSC1S=\"把本机剪贴板发到其他设备\"\nSC2T=\"接收\"\nSC2S=\"拿其他设备的最新剪贴板\"\n$PB -c \"Delete :UIApplicationShortcutItems\" \"$PLIST\" 2>/dev/null || true\n$PB -c \"Add :UIApplicationShortcutItems array\" \"$PLIST\"\n$PB -c \"Add :UIApplicationShortcutItems:0 dict\" \"$PLIST\"\n$PB -c \"Add :UIApplicationShortcutItems:0:UIApplicationShortcutItemType string app.uniclipboard.UniClipboard.shortcut.push\" \"$PLIST\"\n$PB -c \"Add :UIApplicationShortcutItems:0:UIApplicationShortcutItemTitle string $SC1T\" \"$PLIST\"\n$PB -c \"Add :UIApplicationShortcutItems:0:UIApplicationShortcutItemSubtitle string $SC1S\" \"$PLIST\"\n$PB -c \"Add :UIApplicationShortcutItems:0:UIApplicationShortcutItemIconSymbolName string square.and.arrow.up\" \"$PLIST\"\n$PB -c \"Add :UIApplicationShortcutItems:1 dict\" \"$PLIST\"\n$PB -c \"Add :UIApplicationShortcutItems:1:UIApplicationShortcutItemType string app.uniclipboard.UniClipboard.shortcut.pull\" \"$PLIST\"\n$PB -c \"Add :UIApplicationShortcutItems:1:UIApplicationShortcutItemTitle string $SC2T\" \"$PLIST\"\n$PB -c \"Add :UIApplicationShortcutItems:1:UIApplicationShortcutItemSubtitle string $SC2S\" \"$PLIST\"\n$PB -c \"Add :UIApplicationShortcutItems:1:UIApplicationShortcutItemIconSymbolName string square.and.arrow.down\" \"$PLIST\"\nG=$($PB -c \"Print :UIApplicationShortcutItems:0:UIApplicationShortcutItemType\" \"$PLIST\" 2>/dev/null || true)\nH=$($PB -c \"Print :UIApplicationShortcutItems:1:UIApplicationShortcutItemType\" \"$PLIST\" 2>/dev/null || true)\nif [ \"$G\" != \"app.uniclipboard.UniClipboard.shortcut.push\" ]; then echo \"error: UIApplicationShortcutItems[0] persistence failed (got: '$G')\" >&2; exit 1; fi\nif [ \"$H\" != \"app.uniclipboard.UniClipboard.shortcut.pull\" ]; then echo \"error: UIApplicationShortcutItems[1] persistence failed (got: '$H')\" >&2; exit 1; fi\necho \"note: Info.plist hardened (UIFileSharingEnabled, NSAllowsArbitraryLoads, NSLocalNetworkUsageDescription, NSCameraUsageDescription, NSLocationWhenInUseUsageDescription, CFBundleURLTypes/uniclipboard, UIApplicationShortcutItems)\"\n";
		};
/* End PBXShellScriptBuildPhase section */

